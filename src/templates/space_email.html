<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saurabh Labs Space & Science Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; background: #03030d; color: #e2e8f0; line-height: 1.7; }
  .wrapper { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
  .header { background: linear-gradient(135deg, #03030d 0%, #0a0a2e 40%, #0d1b4b 70%, #1a0533 100%); border-radius: 16px; padding: 40px 32px; margin-bottom: 28px; border: 1px solid #1e3a6e; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: '✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦'; font-size: 10px; color: rgba(147,197,253,0.2); position: absolute; top: 12px; left: 0; right: 0; letter-spacing: 8px; }
  .header::after { content: '✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧'; font-size: 10px; color: rgba(147,197,253,0.2); position: absolute; bottom: 12px; left: 0; right: 0; letter-spacing: 8px; }
  .header .logo { font-size: 13px; font-weight: 600; color: #93c5fd; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
  .header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .header .subtitle { font-size: 14px; color: #94a3b8; }
  .header .date-badge { display: inline-block; background: rgba(147,197,253,0.12); border: 1px solid #3b82f6; color: #93c5fd; font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 20px; margin-top: 14px; letter-spacing: 0.5px; }
  .content { background: #080814; border: 1px solid #1e2d4d; border-radius: 12px; padding: 32px; margin-bottom: 20px; }
  .content h1 { font-size: 22px; font-weight: 700; color: #60a5fa; border-bottom: 2px solid #1d4ed8; padding-bottom: 10px; margin: 28px 0 16px; }
  .content h1:first-child { margin-top: 0; }
  .content h2 { font-size: 18px; font-weight: 600; color: #c084fc; margin: 22px 0 10px; }
  .content h3 { font-size: 15px; font-weight: 600; color: #34d399; margin: 16px 0 8px; }
  .content p { font-size: 15px; color: #cbd5e0; margin-bottom: 12px; }
  .content ul, .content ol { padding-left: 22px; margin-bottom: 14px; }
  .content li { font-size: 15px; color: #cbd5e0; margin-bottom: 6px; }
  .content strong { color: #fbbf24; }
  .content em { color: #f472b6; font-style: normal; }
  .content a { color: #60a5fa; text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content code { background: #0f172a; color: #34d399; padding: 2px 6px; border-radius: 4px; font-size: 13px; border: 1px solid #1e3a5f; }
  .content pre { background: #03030d; border: 1px solid #1e2d4d; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 14px; }
  .content blockquote { border-left: 3px solid #3b82f6; padding-left: 16px; color: #94a3b8; font-style: italic; margin: 14px 0; }
  .content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
  .content th { background: #0f172a; color: #60a5fa; padding: 10px 12px; text-align: left; border-bottom: 1px solid #1e3a5f; }
  .content td { border-bottom: 1px solid #1e2d4d; padding: 9px 12px; color: #cbd5e0; }
  .content tr:hover td { background: #0f172a; }
  .content hr { border: none; border-top: 1px solid #1e2d4d; margin: 20px 0; }
  .footer { text-align: center; padding: 20px; color: #334155; font-size: 12px; }
  .footer span { color: #3b82f6; }
  .pill { display: inline-block; background: rgba(96,165,250,0.1); border: 1px solid #3b82f6; color: #60a5fa; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin: 2px; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">🔭 Saurabh Labs Intelligence</div>
    <h1>Space & Science Brief</h1>
    <div class="subtitle">Space · Physics · Astronomy · Science · Virality</div>
    <div class="date-badge">{{DATE}}</div>
  </div>
  <div class="content">
    {{REPORT_CONTENT}}
  </div>
  <div class="footer">
    <p>Generated by <span>Saurabh Labs Intelligence System</span> · Powered by OpenAI GPT-4o</p>
    <p style="margin-top:6px;">{{DATE}}</p>
  </div>
</div>
</body>
</html>
