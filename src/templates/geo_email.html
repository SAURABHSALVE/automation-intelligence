<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saurabh Labs Geo & History Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; background: #0a0f0a; color: #e2e8f0; line-height: 1.7; }
  .wrapper { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
  .header { background: linear-gradient(135deg, #0a1a0a 0%, #1a3a1a 50%, #0d2b0d 100%); border-radius: 16px; padding: 40px 32px; margin-bottom: 28px; border: 1px solid #276749; text-align: center; }
  .header .logo { font-size: 13px; font-weight: 600; color: #68d391; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
  .header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .header .subtitle { font-size: 14px; color: #a0aec0; }
  .header .date-badge { display: inline-block; background: rgba(104,211,145,0.15); border: 1px solid #68d391; color: #68d391; font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 20px; margin-top: 14px; }
  .content { background: #0f1a0f; border: 1px solid #2d3748; border-radius: 12px; padding: 32px; margin-bottom: 20px; }
  .content h1 { font-size: 22px; font-weight: 700; color: #68d391; border-bottom: 2px solid #68d391; padding-bottom: 10px; margin: 28px 0 16px; }
  .content h1:first-child { margin-top: 0; }
  .content h2 { font-size: 18px; font-weight: 600; color: #f6ad55; margin: 22px 0 10px; }
  .content h3 { font-size: 15px; font-weight: 600; color: #90cdf4; margin: 16px 0 8px; }
  .content p { font-size: 15px; color: #cbd5e0; margin-bottom: 12px; }
  .content ul, .content ol { padding-left: 22px; margin-bottom: 14px; }
  .content li { font-size: 15px; color: #cbd5e0; margin-bottom: 6px; }
  .content strong { color: #f6ad55; }
  .content em { color: #fc8181; font-style: normal; }
  .content a { color: #68d391; text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content code { background: #1a2e1a; color: #68d391; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .content pre { background: #0a0f0a; border: 1px solid #2d3748; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 14px; }
  .content blockquote { border-left: 3px solid #68d391; padding-left: 16px; color: #a0aec0; font-style: italic; margin: 14px 0; }
  .content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
  .content th { background: #1a2e1a; color: #68d391; padding: 10px 12px; text-align: left; }
  .content td { border-bottom: 1px solid #2d3748; padding: 9px 12px; color: #cbd5e0; }
  .content tr:hover td { background: #1a2e1a; }
  .footer { text-align: center; padding: 20px; color: #4a5568; font-size: 12px; }
  .footer span { color: #68d391; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">🌍 Saurabh Labs Intelligence</div>
    <h1>Geo & History Brief</h1>
    <div class="subtitle">Geopolitics · History · Science · Fascinating Facts</div>
    <div class="date-badge">{{DATE}}</div>
  </div>
  <div class="content">
    {{REPORT_CONTENT}}
  </div>
  <div class="footer">
    <p>Generated by <span>Saurabh Labs Intelligence System</span> · Powered by Claude AI</p>
    <p style="margin-top:6px;">{{DATE}}</p>
  </div>
</div>
</body>
</html>
